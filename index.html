<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareView — Wellbeing Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #1a3a4a;
      --bg2:      #1e4357;
      --card:     #1e4357;
      --card2:    #245068;
      --card3:    #2a5c76;
      --text:     #f0f8ff;
      --muted:    #8ab4c8;
      --accent:   #4ecdc4;
      --accent2:  #63d4cb;
      --gold:     #f4b942;
      --border:   rgba(255,255,255,0.08);
      --border2:  rgba(255,255,255,0.15);
      --r-sm: 8px; --r-md: 14px; --r-lg: 20px; --r-xl: 26px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Shell */
    .shell { display: grid; grid-template-columns: 68px 240px 1fr; min-height: 100vh; }

    /* Sidenav */
    .sidenav { background: rgba(0,0,0,0.15); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 22px 0; gap: 4px; }
    .logo-mark { width: 40px; height: 40px; border-radius: 12px; background: var(--accent); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
    .logo-mark i { font-size: 21px; color: var(--bg); }
    .nav-ic { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .nav-ic:hover { background: var(--border); color: var(--text); }
    .nav-ic.on { background: rgba(78,205,196,0.18); color: var(--accent); }
    .nav-sp { flex: 1; }
    .user-av { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--bg); cursor: pointer; }

    /* Patient panel */
    .pt-panel { background: rgba(0,0,0,0.12); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; }
    .pt-panel-head { padding: 22px 16px 14px; }
    .pt-panel-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }
    .search { display: flex; align-items: center; gap: 8px; background: var(--card2); border-radius: 99px; padding: 8px 14px; font-size: 13px; color: var(--muted); border: 0.5px solid var(--border); }
    .pt-list { padding: 10px 10px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
    .pt-item { padding: 12px 13px; border-radius: var(--r-md); cursor: pointer; border: 1px solid transparent; transition: all 0.15s; }
    .pt-item:hover { background: var(--card2); }
    .pt-item.on { background: rgba(78,205,196,0.12); border-color: rgba(78,205,196,0.3); }
    .pt-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .pt-av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .pt-name { font-size: 14px; font-weight: 500; flex: 1; color: var(--text); }
    .pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .pt-sub { font-size: 11px; color: var(--muted); padding-left: 46px; }

    /* Main */
    .main { overflow-y: auto; }
    .topbar { display: flex; align-items: center; gap: 8px; padding: 18px 24px; border-bottom: 0.5px solid var(--border); }
    .tab { padding: 7px 18px; border-radius: 99px; font-size: 13px; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-family: var(--font); transition: all 0.15s; }
    .tab:hover { color: var(--text); border-color: var(--border2); }
    .tab.on { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }
    .topbar-right { margin-left: auto; font-size: 12px; color: var(--muted); }

    /* Content */
    .content { padding: 22px 24px; display: flex; flex-direction: column; gap: 16px; }

    /* Cards */
    .card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--r-lg); }
    .cp { padding: 20px 22px; }
    .clabel { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 14px; display: flex; align-items: center; gap: 5px; }

    /* Hero section */
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

    .hero-card { border-radius: var(--r-xl); padding: 24px; background: var(--card2); border: 0.5px solid var(--border); }
    .hc-av-row { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
    .hc-av { width: 54px; height: 54px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.15); }
    .hc-name { font-size: 20px; font-weight: 500; }
    .hc-room { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .score-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
    .score-val { font-size: 36px; font-weight: 600; letter-spacing: -1.5px; line-height: 1; }
    .score-tag { display: inline-block; font-size: 12px; font-weight: 500; padding: 3px 12px; border-radius: 99px; margin-top: 8px; }
    .hc-desc { font-size: 13px; color: var(--muted); margin-top: 14px; line-height: 1.6; }

    /* Wellbeing bars */
    .wb-list { display: flex; flex-direction: column; gap: 13px; }
    .wb-row { display: flex; align-items: center; gap: 12px; }
    .wb-l { font-size: 12px; color: var(--muted); width: 76px; flex-shrink: 0; }
    .wb-track { flex: 1; height: 5px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
    .wb-fill { height: 100%; border-radius: 99px; }
    .wb-n { font-size: 12px; font-weight: 500; width: 26px; text-align: right; }

    /* Stat tiles */
    .stat-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; }
    .stat-tile { background: var(--card2); border: 0.5px solid var(--border); border-radius: var(--r-md); padding: 16px 18px; }
    .st-icon { font-size: 20px; margin-bottom: 10px; }
    .st-val { font-size: 22px; font-weight: 600; letter-spacing: -.5px; }
    .st-label { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* Activity */
    .act-list { display: flex; flex-direction: column; }
    .act-item { display: flex; gap: 13px; align-items: flex-start; padding: 13px 0; border-bottom: 0.5px solid var(--border); }
    .act-item:last-child { border-bottom: none; padding-bottom: 0; }
    .act-ic { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .act-title { font-size: 13px; font-weight: 500; color: var(--text); }
    .act-sub { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
    .act-time { font-size: 11px; color: var(--muted); white-space: nowrap; padding-top: 2px; }

    /* Alerts */
    .al-list { display: flex; flex-direction: column; gap: 9px; }
    .al { border-radius: var(--r-md); padding: 13px 15px; display: flex; gap: 11px; align-items: flex-start; background: var(--card2); border: 0.5px solid var(--border); }
    .al-ic { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .al-title { font-size: 13px; font-weight: 500; }
    .al-body { font-size: 12px; margin-top: 2px; line-height: 1.5; color: var(--muted); }

    /* AI note */
    .ai-note { border-radius: var(--r-md); padding: 16px 18px; background: rgba(78,205,196,0.1); border: 0.5px solid rgba(78,205,196,0.25); }
    .ai-tag { font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
    .ai-body { font-size: 13px; color: var(--muted); line-height: 1.7; }

    /* Family view */
    .fam-hero { border-radius: var(--r-xl); padding: 30px 24px; text-align: center; background: var(--card2); border: 0.5px solid var(--border); }
    .fam-av { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; margin: 0 auto 16px; border: 2px solid rgba(255,255,255,0.15); }
    .fam-status { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
    .fam-sub { font-size: 13px; color: var(--muted); line-height: 1.6; max-width: 260px; margin: 0 auto; }
    .fam-pills { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .fam-pill { background: rgba(255,255,255,0.07); border: 0.5px solid var(--border2); border-radius: 99px; padding: 6px 16px; text-align: center; }
    .fp-val { font-size: 15px; font-weight: 600; }
    .fp-label { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .upd-list { display: flex; flex-direction: column; gap: 10px; }
    .upd { border-radius: var(--r-md); padding: 14px 16px; background: var(--card2); border: 0.5px solid var(--border); border-left: 3px solid; }
    .upd-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; display: flex; align-items: center; gap: 7px; }
    .upd-body { font-size: 12px; color: var(--muted); line-height: 1.6; }

    .ct-list { display: flex; flex-direction: column; }
    .ct-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
    .ct-row:last-child { border-bottom: none; }
    .ct-av { width: 36px; height: 36px; border-radius: 50%; background: rgba(78,205,196,0.2); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
    .ct-name { font-size: 13px; font-weight: 500; }
    .ct-rel { font-size: 11px; color: var(--muted); }
    .ct-btn { margin-left: auto; font-size: 11px; padding: 5px 13px; border-radius: 99px; border: 0.5px solid var(--border2); background: transparent; cursor: pointer; color: var(--muted); font-family: var(--font); }
    .ct-btn:hover { background: var(--border); color: var(--text); }

    .fam-note { border-radius: var(--r-md); padding: 16px 18px; background: rgba(78,205,196,0.08); border: 0.5px solid rgba(78,205,196,0.2); }
    .fam-note-tag { font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
    .fam-note-body { font-size: 13px; color: var(--muted); line-height: 1.7; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .hidden { display: none !important; }
  </style>
</head>

let sel = 0, view = 'caregiver';

function setView(v, btn) {
  view = v;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function pick(id) { sel = id; renderList(); render(); }

function renderList() {
  document.getElementById('pt-list').innerHTML = people.map(p => `
    <div class="pt-item ${p.id===sel?'on':''}" onclick="pick(${p.id})">
      <div class="pt-row">
        <div class="pt-av" style="background:${p.avBg};">${p.initials}</div>
        <div class="pt-name">${p.name}</div>
        <div class="pip" style="background:${p.pipColor};"></div>
      </div>
      <div class="pt-sub">${p.age} · ${p.room} · ${p.statusLabel}</div>
    </div>
  `).join('');
}

function render() {
  const p = people[sel];
  document.getElementById('topbar-sub').textContent =
    view==='caregiver' ? 'Clinical & behavioral overview' : 'For family members & loved ones';
  view==='caregiver' ? renderCG(p) : renderFam(p);
}

function renderCG(p) {
  document.getElementById('content').innerHTML = `
    <div class="hero-row">
      <div class="hero-card">
        <div class="hc-av-row">
          <div class="hc-av" style="background:${p.avBg};">${p.initials}</div>
          <div>
            <div class="hc-name">${p.name}</div>
            <div class="hc-room">${p.age} · ${p.room}</div>
          </div>
        </div>
        <div class="score-label">Overall wellbeing today</div>
        <div class="score-val" style="color:${p.scoreColor};">${p.score}<span style="font-size:18px;font-weight:400;color:var(--muted);"> /100</span></div>
        <span class="score-tag" style="background:${p.scoreColor}22;color:${p.scoreColor};">${p.scoreLabel}</span>
        <div class="hc-desc">${p.tagline}</div>
      </div>
      <div class="hero-card" style="grid-column:span 2;">
        <div class="clabel"><i class="ti ti-heart"></i> Wellbeing breakdown</div>
        <div class="wb-list">
          ${p.wb.map(w=>`
            <div class="wb-row">
              <div class="wb-l">${w.l}</div>
              <div class="wb-track"><div class="wb-fill" style="width:${w.v}%;background:${w.c};"></div></div>
              <div class="wb-n" style="color:${w.c};">${w.v}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="stat-row">
      ${p.stats.map(s=>`
        <div class="stat-tile">
          <div class="st-icon"><i class="ti ${s.icon}" style="color:${s.c};"></i></div>
          <div class="st-val" style="color:${s.c};">${s.val}</div>
          <div class="st-label">${s.label}</div>
        </div>
      `).join('')}
    </div>

    <div class="two-col">
      <div class="card cp">
        <div class="clabel"><i class="ti ti-calendar"></i> Today's activity</div>
        <div class="act-list">
          ${p.activities.map(a=>`
            <div class="act-item">
              <div class="act-ic" style="background:${a.iBg};color:${a.iC};"><i class="ti ${a.icon}"></i></div>
              <div style="flex:1;">
                <div class="act-title">${a.title}</div>
                <div class="act-sub">${a.sub}</div>
              </div>
              <div class="act-time">${a.time}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="card cp">
          <div class="clabel"><i class="ti ti-alert-circle"></i> Focus areas today</div>
          <div class="al-list">
            ${p.alerts.map(a=>`
              <div class="al">
                <div class="al-ic"><i class="ti ${a.icon}" style="color:${a.c};"></i></div>
                <div>
                  <div class="al-title" style="color:${a.c};">${a.title}</div>
                  <div class="al-body">${a.body}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="ai-note">
          <div class="ai-tag"><i class="ti ti-brain" style="font-size:12px;"></i> AI summary</div>
          <div class="ai-body">${p.aiNote}</div>
        </div>
      </div>
    </div>
  `;
}

function renderFam(p) {
  document.getElementById('content').innerHTML = `
    <div class="two-col">
      <div class="fam-hero">
        <div class="fam-av" style="background:${p.avBg};">${p.initials}</div>

        <div class="fam-pills">
          ${p.famPills.map(fp=>`

            </div>

        </div>
      </div>

      <div class="card cp">
        <div class="clabel"><i class="ti ti-sparkles"></i> Today's updates</div>
        <div class="upd-list">
          ${p.famUpdates.map(u=>`
            <div class="upd" style="border-left-color:${u.c};">
              <div class="upd-title" style="color:${u.c};"><i class="ti ${u.icon}" style="font-size:14px;"></i>${u.title}</div>
              <div class="upd-body">${u.body}</div>

        </div>

    <div class="two-col">

        <div class="clabel"><i class="ti ti-users"></i> Family contacts</div>
        <div class="ct-list">
          ${p.contacts.map(c=>`
            <div class="ct-row">

              <button class="ct-btn">Message care team</button>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="fam-note">
        <div class="fam-note-tag"><i class="ti ti-message-circle" style="font-size:12px;"></i> Note from the care team</div>
        <div class="fam-note-body">${p.famNote}</div>
      </div>
    </div>
  `;
}

renderList();
render();
