<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareView — Health & Wellbeing Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f3; --card: #ffffff; --text: #1a1a18; --muted: #6b6b67;
      --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.18);
      --radius-md: 10px; --radius-lg: 14px; --radius-xl: 20px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1a1a18; --card: #242422; --text: #f0efe8; --muted: #9a9993; --border: rgba(255,255,255,0.09); --border2: rgba(255,255,255,0.18); }
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
    .wrap { max-width: 1120px; margin: 0 auto; }

    /* Topbar */
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .logo { display: flex; align-items: center; gap: 9px; }
    .logo h1 { font-size: 19px; font-weight: 500; }
    .logo sub { font-size: 12px; color: var(--muted); font-weight: 400; display: block; margin-top: 1px; }

    /* View toggle */
    .view-toggle { display: flex; background: var(--card); border: 0.5px solid var(--border2); border-radius: 99px; padding: 3px; gap: 2px; }
    .vt-btn { padding: 6px 16px; border-radius: 99px; border: none; font-size: 13px; cursor: pointer; background: transparent; color: var(--muted); font-family: var(--font); transition: all 0.15s; }
    .vt-btn.active { background: #534AB7; color: #fff; }

    /* Patient pill row */
    .patient-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .ppill { display: flex; align-items: center; gap: 9px; padding: 10px 16px; background: var(--card); border: 0.5px solid var(--border); border-radius: 99px; cursor: pointer; transition: all 0.15s; }
    .ppill.active { border: 1.5px solid #534AB7; }
    .ppill-av { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
    .ppill-name { font-size: 14px; font-weight: 500; }
    .ppill-status { font-size: 11px; }

    /* Main grid */
    .grid { display: grid; gap: 12px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0,1fr)); }

    /* Cards */
    .card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 18px; }
    .card-sm { padding: 14px 16px; }
    .card-title { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }

    /* Hero card */
    .hero { border-radius: var(--radius-xl); padding: 22px 24px; }
    .hero-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
    .hero-av { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 500; flex-shrink: 0; }
    .hero-name { font-size: 22px; font-weight: 500; }
    .hero-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .hero-mood { display: inline-flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 13px; padding: 5px 12px; border-radius: 99px; }
    .overall-label { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .overall-val { font-size: 28px; font-weight: 500; }
    .overall-desc { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

    /* Wellbeing bars */
    .wb-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
    .wb-label { width: 90px; color: var(--muted); flex-shrink: 0; }
    .wb-bar-wrap { flex: 1; height: 7px; background: var(--bg); border-radius: 99px; overflow: hidden; }
    .wb-bar { height: 100%; border-radius: 99px; }
    .wb-val { font-size: 12px; font-weight: 500; min-width: 28px; text-align: right; }

    /* Activity feed */
    .activity-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); align-items: flex-start; }
    .activity-item:last-child { border-bottom: none; padding-bottom: 0; }
    .act-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .act-text { flex: 1; }
    .act-title { font-size: 13px; font-weight: 500; }
    .act-sub { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
    .act-time { font-size: 11px; color: var(--muted); white-space: nowrap; }

    /* Stat tiles */
    .stat { border-radius: var(--radius-md); padding: 14px; }
    .stat-icon { font-size: 20px; margin-bottom: 8px; }
    .stat-val { font-size: 20px; font-weight: 500; }
    .stat-label { font-size: 12px; margin-top: 3px; opacity: .75; }

    /* AI summary box */
    .ai-box { border-radius: var(--radius-lg); padding: 16px 18px; }
    .ai-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 99px; margin-bottom: 10px; }
    .ai-text { font-size: 14px; line-height: 1.7; }
    .ai-text p { margin-bottom: 8px; }
    .ai-text p:last-child { margin-bottom: 0; }

    /* Alerts */
    .alert-item { display: flex; gap: 10px; align-items: flex-start; padding: 11px 13px; border-radius: var(--radius-md); margin-bottom: 8px; }
    .alert-item:last-child { margin-bottom: 0; }
    .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .alert-title { font-size: 13px; font-weight: 500; }
    .alert-body { font-size: 12px; margin-top: 2px; line-height: 1.5; opacity: .85; }

    /* Family view specific */
    .fam-feeling { text-align: center; padding: 24px; }
    .fam-emoji { font-size: 52px; line-height: 1; margin-bottom: 10px; }
    .fam-status-text { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
    .fam-status-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }

    .update-card { border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 10px; }
    .update-card:last-child { margin-bottom: 0; }
    .update-icon-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 14px; font-weight: 500; }
    .update-body { font-size: 13px; line-height: 1.65; }

    .contact-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
    .contact-row:last-child { border-bottom: none; }
    .contact-av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; background: #E6F1FB; color: #185FA5; }
    .contact-name { font-size: 14px; font-weight: 500; }
    .contact-rel { font-size: 12px; color: var(--muted); }
    .contact-btn { margin-left: auto; font-size: 12px; padding: 5px 12px; border-radius: 99px; border: 0.5px solid var(--border2); background: transparent; cursor: pointer; color: var(--text); }

    .hidden { display: none !important; }

    @media (max-width: 780px) {
      .grid-3, .grid-4 { grid-template-columns: repeat(2,1fr); }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>

      { icon: "ti-moon",       val: "6.5h", label: "Sleep last night",  bg: "#E1F5EE", color: "#0F6E56" },
      { icon: "ti-footprint",  val: "890",  label: "Steps today",       bg: "#FAEEDA", color: "#854F0B" },
      { icon: "ti-bowl-spoon", val: "75%",  label: "Meal finished",     bg: "#E1F5EE", color: "#0F6E56" },
      { icon: "ti-wind",       val: "Easier", label: "Breathing today", bg: "#E1F5EE", color: "#0F6E56" },
    ],
    activities: [
      { icon: "ti-wind", iconBg: "#E1F5EE", iconColor: "#0F6E56", title: "Breathing without extra oxygen", sub: "Off supplemental oxygen since this morning — breathing on his own now. A big milestone.", time: "Since 8am" },
      { icon: "ti-friends", iconBg: "#EEEDFE", iconColor: "#534AB7", title: "Wife Ngozi visited", sub: "She brought food from home. James ate more than he has all week and seemed very cheered up.", time: "2:00pm" },
      { icon: "ti-tv", iconBg: "#E6F1FB", iconColor: "#185FA5", title: "Watched football highlights", sub: "Relaxed and in good spirits in the afternoon. Chatting more with the nursing staff.", time: "3:30pm" },
      { icon: "ti-moon", iconBg: "#E1F5EE", iconColor: "#0F6E56", title: "Better sleep than previous nights", sub: "Less coughing overnight. Said he felt the most rested he has since being admitted.", time: "Last night" },
    ],
    cgAlerts: [
      { type: "good", bg: "#E1F5EE", color: "#0F6E56", icon: "ti-lungs", title: "Off supplemental oxygen", body: "Breathing independently since morning — this is a meaningful recovery milestone for James." },
      { type: "info", bg: "#EEEDFE", color: "#534AB7", icon: "ti-stethoscope", title: "Lung follow-up recommended", body: "James has mild COPD. Plan a pulmonology referral before discharge to support his long-term breathing health." },
    ],
    aiCaregiver: "James is on a clear upward trajectory. Coming off supplemental oxygen this morning is the biggest milestone of his stay so far. His mood has lifted noticeably — wife Ngozi's visits are clearly very beneficial and he eats much better when she's present.\n\nHis energy is still a bit low, which is normal for someone recovering from pneumonia at his age. He shouldn't be pushed to do too much, but gentle encouragement to move around is appropriate.\n\nPlan ahead for his COPD management — this admission is a good opportunity to get him connected with a pulmonologist he can see regularly after discharge.",
    familyStatus: "getting better every day",
    familyEmoji: "🙂",
    familyHeadline: "James is breathing much better — a real turning point",
    familyUpdates: [
      { icon: "ti-wind", bg: "#E1F5EE", color: "#0F6E56", title: "He's breathing on his own again", body: "James no longer needs the extra oxygen support he came in with. His lungs are doing the work themselves now — this is a really positive sign." },
      { icon: "ti-moon", bg: "#E1F5EE", color: "#0F6E56", title: "Best sleep of his stay", body: "He coughed much less last night and woke up saying he felt more rested. The treatment is clearly working." },
      { icon: "ti-friends", bg: "#EEEDFE", color: "#534AB7", title: "Ngozi's visit really helped", body: "He ate more during her visit than he had all week and was in great spirits all afternoon. Visits make a real difference." },
      { icon: "ti-home", bg: "#FAEEDA", color: "#854F0B", title: "Discharge being planned", body: "The team is working toward sending him home in the next couple of days if he keeps improving. We'll keep you updated." },
    ],
    contacts: [
      { initials: "NO", name: "Ngozi Okafor", rel: "Wife (primary contact)" },
      { initials: "TO", name: "Tunde Okafor", rel: "Son" },
    ],
  },
];

let selected = 0;
let currentView = 'caregiver';

function setView(v) {
  currentView = v;
  document.querySelectorAll('.vt-btn').forEach(b => b.classList.remove('active'));
  event.target.closest('.vt-btn').classList.add('active');
  document.getElementById('caregiver-view').classList.toggle('hidden', v !== 'caregiver');
  document.getElementById('family-view').classList.toggle('hidden', v !== 'family');
  render();
}

function selectPerson(id) {
  selected = id;
  renderPills();
  render();
}

function renderPills() {
  document.getElementById('patient-row').innerHTML = people.map(p => `
    <div class="ppill ${p.id === selected ? 'active' : ''}" onclick="selectPerson(${p.id})">
      <div class="ppill-av" style="background:${p.avatarBg};color:${p.avatarColor};">${p.initials}</div>
      <div>
        <div class="ppill-name">${p.name}</div>
        <div class="ppill-status" style="color:${p.pillStatusColor};">${p.pillStatus}</div>
      </div>
    </div>
  `).join('');
}

function renderCaregiver(p) {
  document.getElementById('caregiver-view').innerHTML = `
    <div class="grid grid-2" style="margin-bottom:12px;">
      <div class="card hero" style="background:${p.avatarBg}20;">
        <div class="hero-top">
          <div class="hero-av" style="background:${p.avatarBg};color:${p.avatarColor};">${p.initials}</div>
          <div>
            <div class="hero-name">${p.name}</div>
            <div class="hero-sub">${p.age} years old · ${p.room}</div>
            <div class="hero-mood" style="background:${p.mood.bg};color:${p.mood.color};">
              ${p.mood.emoji} ${p.mood.label}
            </div>
          </div>
        </div>
        <div class="overall-label">Overall wellbeing today</div>
        <div class="overall-val" style="color:${p.overallColor};">${p.overallScore}/100 — ${p.overallLabel}</div>
        <div class="overall-desc">${p.overallDesc}</div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-heart"></i> Wellbeing breakdown</div>
        ${p.wellbeing.map(w => `
          <div class="wb-row">
            <div class="wb-label">${w.label}</div>
            <div class="wb-bar-wrap"><div class="wb-bar" style="width:${w.val}%;background:${w.color};"></div></div>
            <div class="wb-val" style="color:${w.color};">${w.val}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="grid grid-4" style="margin-bottom:12px;">
      ${p.stats.map(s => `
        <div class="stat card card-sm" style="background:${s.bg}20;border-color:${s.bg};">
          <div class="stat-icon"><i class="ti ${s.icon}" style="color:${s.color};font-size:22px;"></i></div>
          <div class="stat-val" style="color:${s.color};">${s.val}</div>
          <div class="stat-label" style="color:${s.color};">${s.label}</div>
        </div>
      `).join('')}
    </div>

    <div class="grid grid-2" style="margin-bottom:12px;">
      <div class="card">
        <div class="card-title"><i class="ti ti-calendar"></i> Today's activity</div>
        ${p.activities.map(a => `
          <div class="activity-item">
            <div class="act-icon" style="background:${a.iconBg};color:${a.iconColor};"><i class="ti ${a.icon}"></i></div>
            <div class="act-text">
              <div class="act-title">${a.title}</div>
              <div class="act-sub">${a.sub}</div>
            </div>
            <div class="act-time">${a.time}</div>
          </div>
        `).join('')}
      </div>

      <div>
        <div class="card" style="margin-bottom:12px;">
          <div class="card-title"><i class="ti ti-alert-circle"></i> What to watch today</div>
          ${p.cgAlerts.map(a => `
            <div class="alert-item" style="background:${a.bg}30;color:${a.color};">
              <div class="alert-icon"><i class="ti ${a.icon}"></i></div>
              <div>
                <div class="alert-title">${a.title}</div>
                <div class="alert-body">${a.body}</div>
              </div>
            </div>
          `).join('')}
        </div>

        <div class="card ai-box" style="background:#EEEDFE20;border-color:#EEEDFE;">
          <div class="ai-tag" style="background:#EEEDFE;color:#3C3489;"><i class="ti ti-brain" style="font-size:12px;"></i> AI summary</div>
          <div class="ai-text" style="color:var(--muted);">
            ${p.aiCaregiver.split('\n\n').map(para => `<p>${para}</p>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderFamily(p) {
  document.getElementById('family-view').innerHTML = `
    <div class="grid grid-2" style="margin-bottom:12px;">
      <div class="card">
        <div class="fam-feeling">
          <div class="fam-emoji">${p.familyEmoji}</div>
          <div class="fam-status-text">${p.name.split(' ')[0]} is ${p.familyStatus}</div>
          <div class="fam-status-sub">${p.overallDesc}</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-sparkles"></i> Today's highlights for family</div>
        ${p.familyUpdates.map(u => `
          <div class="update-card" style="background:${u.bg}25;border-left:3px solid ${u.color};border-radius:0 var(--radius-md) var(--radius-md) 0;padding:12px 14px;margin-bottom:9px;">
            <div class="update-icon-row" style="color:${u.color};"><i class="ti ${u.icon}"></i> ${u.title}</div>
            <div class="update-body" style="color:var(--muted);">${u.body}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <div class="card-title"><i class="ti ti-users"></i> Family contacts on file</div>
        ${p.contacts.map(c => `
          <div class="contact-row">
            <div class="contact-av">${c.initials}</div>
            <div>
              <div class="contact-name">${c.name}</div>
              <div class="contact-rel">${c.rel}</div>
            </div>
            <button class="contact-btn">Message care team</button>
          </div>
        `).join('')}
        <div style="margin-top:14px;font-size:12px;color:var(--muted);line-height:1.6;padding:10px 12px;background:var(--bg);border-radius:var(--radius-md);">
          <i class="ti ti-info-circle" style="font-size:13px;margin-right:4px;"></i>
          Updates are refreshed throughout the day. For urgent concerns, please contact the ward directly.
        </div>
      </div>

      <div class="card ai-box" style="background:#E1F5EE20;border-color:#9FE1CB;">
        <div class="ai-tag" style="background:#E1F5EE;color:#0F6E56;"><i class="ti ti-message-circle" style="font-size:12px;"></i> Note from the care team</div>
        <div class="ai-text" style="color:var(--muted);">
          ${p.aiCaregiver.split('\n\n').map(para => `<p>${para}</p>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function render() {
  const p = people[selected];
  if (currentView === 'caregiver') renderCaregiver(p);
  else renderFamily(p);
}

renderPills();
render();
</script>
</body>
</html>
