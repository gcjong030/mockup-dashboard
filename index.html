<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareView — Wellbeing Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#f2f1ee; --card:#fff; --side:#1c2b36;
      --text:#1a1a18; --muted:#6b6b67; --soft:#eeecea;
      --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
      --teal:#2db5a8; --teal-l:#e6f7f6;
      --gold:#e8a020; --gold-l:#fef5e6;
      --red:#d95c4a;  --red-l:#fdecea;
      --purple:#6b5ed4; --purple-l:#efedf9;
      --green:#2d9e6e; --green-l:#e6f5ef;
      --r-sm:6px; --r-md:12px; --r-lg:18px; --r-xl:24px;
      --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    }
    body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; }
    .shell { display:grid; grid-template-columns:64px 228px 1fr; min-height:100vh; }

    /* Sidebar */
    .side { background:var(--side); display:flex; flex-direction:column; align-items:center; padding:20px 0; gap:4px; }
    .logo { width:38px; height:38px; border-radius:10px; background:var(--teal); display:flex; align-items:center; justify-content:center; margin-bottom:18px; }
    .logo i { font-size:20px; color:#fff; }
    .ni { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:19px; color:rgba(255,255,255,0.35); cursor:pointer; }
    .ni:hover { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.8); }
    .ni.on { background:rgba(255,255,255,0.12); color:#fff; }
    .sp { flex:1; }
    .userav { width:32px; height:32px; border-radius:50%; background:var(--teal); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:#fff; }

    /* Patient panel */
    .ptpanel { background:var(--card); border-right:1px solid var(--border); display:flex; flex-direction:column; }
    .pthead { padding:20px 16px 12px; border-bottom:1px solid var(--border); }
    .pthead-title { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:10px; }
    .srch { display:flex; align-items:center; gap:7px; background:var(--bg); border-radius:99px; padding:8px 13px; font-size:13px; color:var(--muted); border:1px solid var(--border); }
    .ptlist { padding:10px; display:flex; flex-direction:column; gap:3px; overflow-y:auto; }
    .pti { padding:11px 12px; border-radius:var(--r-md); cursor:pointer; border:1.5px solid transparent; transition:all .12s; }
    .pti:hover { background:var(--bg); }
    .pti.on { background:var(--teal-l); border-color:var(--teal); }
    .ptirow { display:flex; align-items:center; gap:9px; margin-bottom:5px; }
    .ptav { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:#fff; flex-shrink:0; }
    .ptname { font-size:14px; font-weight:500; flex:1; }
    .pip { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .ptmeta { font-size:11px; color:var(--muted); padding-left:43px; }

    /* Main */
    .main { overflow-y:auto; display:flex; flex-direction:column; }
    .topbar { display:flex; align-items:center; gap:6px; padding:16px 24px; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10; }
    .tab { padding:7px 16px; border-radius:99px; font-size:13px; cursor:pointer; border:1.5px solid var(--border2); background:transparent; color:var(--muted); font-family:var(--font); transition:all .12s; }
    .tab:hover { color:var(--text); }
    .tab.on { background:var(--side); color:#fff; border-color:var(--side); font-weight:500; }
    .tbright { margin-left:auto; font-size:12px; color:var(--muted); }

    .content { padding:22px 24px; display:flex; flex-direction:column; gap:14px; }

    /* Cards */
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg); }
    .cp { padding:18px 20px; }
    .clabel { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:13px; display:flex; align-items:center; gap:5px; }

    /* Grid helpers */
    .g2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
    .g4 { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; }

    /* Hero */
    .hero-card { border-radius:var(--r-xl); padding:22px; }
    .hcavrow { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
    .hcav { width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600; color:#fff; flex-shrink:0; }
    .hcname { font-size:19px; font-weight:500; }
    .hcroom { font-size:12px; color:var(--muted); margin-top:2px; }
    .score-lbl { font-size:11px; color:var(--muted); margin-bottom:4px; }
    .score-val { font-size:36px; font-weight:700; letter-spacing:-1.5px; line-height:1; }
    .score-chip { display:inline-block; font-size:12px; font-weight:500; padding:3px 12px; border-radius:99px; margin-top:8px; }
    .hcdesc { font-size:13px; color:var(--muted); margin-top:12px; line-height:1.6; }

    /* Vitals */
    .vital-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
    .vital { border-radius:var(--r-md); padding:12px 14px; border:1px solid transparent; }
    .vital-label { font-size:11px; margin-bottom:4px; font-weight:500; }
    .vital-val { font-size:20px; font-weight:700; letter-spacing:-.5px; }
    .vital-unit { font-size:12px; font-weight:400; margin-left:1px; }
    .vital-note { font-size:11px; margin-top:3px; opacity:.8; }

    /* Wellbeing bars */
    .wb-list { display:flex; flex-direction:column; gap:12px; }
    .wb-row { display:flex; align-items:center; gap:12px; }
    .wb-l { font-size:12px; color:var(--muted); width:74px; flex-shrink:0; }
    .wb-track { flex:1; height:6px; background:var(--soft); border-radius:99px; overflow:hidden; }
    .wb-fill { height:100%; border-radius:99px; }
    .wb-n { font-size:12px; font-weight:600; width:24px; text-align:right; }

    /* Stat tiles */
    .stile { border-radius:var(--r-md); padding:15px 17px; border:1px solid transparent; }
    .st-icon { font-size:20px; margin-bottom:9px; }
    .st-val { font-size:20px; font-weight:700; letter-spacing:-.5px; }
    .st-label { font-size:11px; margin-top:3px; opacity:.7; }

    /* Activity */
    .act-list { display:flex; flex-direction:column; }
    .act-item { display:flex; gap:12px; align-items:flex-start; padding:11px 0; border-bottom:1px solid var(--border); }
    .act-item:last-child { border-bottom:none; padding-bottom:0; }
    .act-ic { width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
    .act-title { font-size:13px; font-weight:500; }
    .act-sub { font-size:12px; color:var(--muted); margin-top:2px; line-height:1.5; }
    .act-time { font-size:11px; color:var(--muted); white-space:nowrap; }

    /* Behavioral flags */
    .flag { display:flex; gap:10px; align-items:flex-start; padding:11px 13px; border-radius:var(--r-md); margin-bottom:8px; border:1px solid transparent; }
    .flag:last-child { margin-bottom:0; }
    .flag-ic { font-size:15px; flex-shrink:0; margin-top:1px; }
    .flag-title { font-size:13px; font-weight:500; }
    .flag-body { font-size:12px; margin-top:2px; line-height:1.5; opacity:.85; }

    /* AI */
    .ai-box { border-radius:var(--r-md); padding:15px 17px; background:var(--purple-l); border:1px solid #d4cfee; }
    .ai-tag { font-size:11px; font-weight:600; color:var(--purple); text-transform:uppercase; letter-spacing:.07em; margin-bottom:7px; display:flex; align-items:center; gap:5px; }
    .ai-body { font-size:13px; color:#4a4270; line-height:1.7; }

    /* Med schedule */
    .med-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .med-row:last-child { border-bottom:none; }
    .med-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .med-name { font-weight:500; flex:1; }
    .med-dose { color:var(--muted); font-size:12px; }
    .med-chip { font-size:11px; padding:3px 10px; border-radius:99px; font-weight:500; }

    /* Care team */
    .ct-member { display:flex; align-items:center; gap:11px; padding:10px 0; border-bottom:1px solid var(--border); }
    .ct-member:last-child { border-bottom:none; }
    .ctav { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; }
    .ctname { font-size:13px; font-weight:500; }
    .ctrole { font-size:11px; color:var(--muted); }

    /* ── FAMILY VIEW ── */
    .fhero { border-radius:var(--r-xl); padding:26px 22px; }
    .fav { width:54px; height:54px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:600; color:#fff; margin:0 auto 14px; }
    .fstatus { font-size:20px; font-weight:500; text-align:center; margin-bottom:5px; }
    .fsub { font-size:13px; color:var(--muted); line-height:1.6; text-align:center; max-width:240px; margin:0 auto; }
    .fpills { display:flex; justify-content:center; gap:9px; margin-top:18px; flex-wrap:wrap; }
    .fpill { background:rgba(255,255,255,0.75); border:1px solid var(--border2); border-radius:99px; padding:7px 15px; text-align:center; }
    .fpv { font-size:14px; font-weight:600; }
    .fpl { font-size:10px; color:var(--muted); margin-top:1px; }

    /* "What they're not telling you" */
    .honest-card { border-radius:var(--r-lg); padding:18px 20px; background:var(--purple-l); border:1px solid #d4cfee; }
    .honest-tag { font-size:11px; font-weight:600; color:var(--purple); text-transform:uppercase; letter-spacing:.07em; margin-bottom:12px; display:flex; align-items:center; gap:5px; }
    .honest-item { display:flex; gap:10px; align-items:flex-start; margin-bottom:11px; }
    .honest-item:last-child { margin-bottom:0; }
    .honest-dot { width:7px; height:7px; border-radius:50%; background:var(--purple); margin-top:5px; flex-shrink:0; }
    .honest-text { font-size:13px; color:#4a4270; line-height:1.6; }
    .honest-text strong { color:var(--purple); }

    /* Family updates */
    .upd-list { display:flex; flex-direction:column; gap:9px; }
    .upd { border-radius:var(--r-md); padding:13px 15px; background:var(--card); border:1px solid var(--border); border-left:3px solid; }
    .upd-title { font-size:13px; font-weight:500; margin-bottom:3px; display:flex; align-items:center; gap:7px; }
    .upd-body { font-size:12px; color:var(--muted); line-height:1.6; }

    /* Family contacts */
    .fc-row { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--border); }
    .fc-row:last-child { border-bottom:none; }
    .fcav { width:34px; height:34px; border-radius:50%; background:var(--teal-l); color:var(--teal); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; }
    .fcname { font-size:13px; font-weight:500; }
    .fcrel { font-size:11px; color:var(--muted); }
    .fcbtn { margin-left:auto; font-size:11px; padding:5px 12px; border-radius:99px; border:1px solid var(--border2); background:transparent; cursor:pointer; color:var(--muted); font-family:var(--font); }
    .fcbtn:hover { background:var(--bg); color:var(--text); }

    /* Care team note */
    .fnote { border-radius:var(--r-md); padding:15px 17px; background:var(--green-l); border:1px solid #b8dece; }
    .fnote-tag { font-size:11px; font-weight:600; color:var(--green); text-transform:uppercase; letter-spacing:.07em; margin-bottom:7px; display:flex; align-items:center; gap:5px; }
    .fnote-body { font-size:13px; color:#1f6647; line-height:1.7; }

    /* What to do */
    .todo-item { display:flex; gap:10px; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--border); }
    .todo-item:last-child { border-bottom:none; }
    .todo-num { width:22px; height:22px; border-radius:50%; background:var(--teal-l); color:var(--teal); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; margin-top:1px; }
    .todo-text { font-size:13px; line-height:1.5; }
    .todo-sub { font-size:12px; color:var(--muted); margin-top:2px; }

    /* Moment card */
    .moment { border-radius:var(--r-md); padding:14px 16px; background:var(--gold-l); border:1px solid #f0cc88; }
    .moment-tag { font-size:11px; font-weight:600; color:var(--gold); text-transform:uppercase; letter-spacing:.07em; margin-bottom:7px; display:flex; align-items:center; gap:5px; }
    .moment-body { font-size:13px; color:#9a6010; line-height:1.7; font-style:italic; }
  </style>
</head>
<body>
<div class="shell">
  <nav class="side">
    <div class="logo"><i class="ti ti-heart-handshake"></i></div>
    <div class="ni on"><i class="ti ti-layout-dashboard"></i></div>
    <div class="ni"><i class="ti ti-users"></i></div>
    <div class="ni"><i class="ti ti-calendar"></i></div>
    <div class="ni"><i class="ti ti-bell"></i></div>
    <div class="sp"></div>
    <div class="ni"><i class="ti ti-settings"></i></div>
    <div class="userav" style="margin-top:6px;">RN</div>
  </nav>

  <aside class="ptpanel">
    <div class="pthead">
      <div class="pthead-title">Patients</div>
      <div class="srch"><i class="ti ti-search" style="font-size:14px;"></i> Search</div>
    </div>
    <div class="ptlist" id="ptlist"></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="tab on" onclick="setView('cg',this)">Caregiver view</button>
      <button class="tab" onclick="setView('fam',this)">Family view</button>
      <span class="tbright" id="tbsub"></span>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
const P = [
  {
    id:0, name:"Eleanor Voss", ini:"EV", age:72, room:"Room 304",
    avc:"#c47a2a", pip:"#d95c4a", status:"Needs attention",
    score:58, sc:"#e8a020", sl:"Fair",
    tag:"Resting comfortably. Breathing requires closer monitoring today.",
    fhbg:"#fef5e6",

    vitals:[

let sel=0, view='cg';

function stBg(c){
  if(c==='#e8a020'||c==='#c47a10') return '#fef5e6';
  if(c==='#d95c4a') return '#fdecea';
  if(c==='#2d9e6e') return '#e6f5ef';
  if(c==='#2db5a8') return '#e6f7f6';
  if(c==='#6b5ed4') return '#efedf9';
  return '#f2f1ee';
}

function setView(v,btn){
  view=v;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function pick(id){ sel=id; renderList(); render(); }

function renderList(){
  document.getElementById('ptlist').innerHTML=P.map(p=>`
    <div class="pti ${p.id===sel?'on':''}" onclick="pick(${p.id})">
      <div class="ptirow">
        <div class="ptav" style="background:${p.avc};">${p.ini}</div>
        <div class="ptname">${p.name}</div>
        <div class="pip" style="background:${p.pip};"></div>
      </div>
      <div class="ptmeta">${p.age} · ${p.status}</div>
    </div>
  `).join('');
}

function render(){
  const p=P[sel];
  document.getElementById('tbsub').textContent = view==='cg'
    ? 'Clinical & behavioral overview'
    : 'For family members & loved ones';
  view==='cg' ? renderCG(p) : renderFam(p);
}

function renderCG(p){

            <div class="hcname">${p.name}</div>

          </div>
        </div>
        <div class="score-lbl">Overall wellbeing today</div>
        <div class="score-val" style="color:${p.sc};">${p.score}<span style="font-size:18px;font-weight:400;color:var(--muted);"> /100</span></div>

        <div class="wb-list">
          ${p.wb.map(w=>`

              <div class="wb-l">${w.l}</div>
              <div class="wb-track"><div class="wb-fill" style="width:${w.v}%;background:${w.c};"></div></div>
              <div class="wb-n" style="color:${w.c};">${w.v}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <!-- Vitals -->
    <div class="card cp">
      <div class="clabel"><i class="ti ti-activity-heartbeat"></i> Vitals</div>

        ${p.vitals.map(v=>`

            <div class="vital-label" style="color:${v.c};">${v.label}</div>
            <div class="vital-val" style="color:${v.c};">${v.val}<span class="vital-unit">${v.unit}</span></div>
            <div class="vital-note" style="color:${v.c};">${v.note}</div>
          </div>

      </div>
    </div>

    <!-- Daily stats -->
    <div class="g4">
      ${p.stats.map(s=>`
        <div class="stile" style="background:${stBg(s.c)};border-color:transparent;">
          <div class="st-icon"><i class="ti ${s.icon}" style="color:${s.c};font-size:22px;"></i></div>
          <div class="st-val" style="color:${s.c};">${s.val}</div>
          <div class="st-label" style="color:${s.c};">${s.label}</div>
        </div>
      `).join('')}
    </div>

    <!-- Activity + Behavioral flags -->
    <div class="g2">
      <div class="card cp">
        <div class="clabel"><i class="ti ti-calendar"></i> Today's activity</div>
        <div class="act-list">
          ${p.acts.map(a=>`
            <div class="act-item">
              <div class="act-ic" style="background:${a.ib};color:${a.ic2};"><i class="ti ${a.ic}"></i></div>
              <div style="flex:1;">
                <div class="act-title">${a.t}</div>
                <div class="act-sub">${a.s}</div>
              </div>
              <div class="act-time">${a.time}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="card cp">
        <div class="clabel"><i class="ti ti-eye"></i> Signs to know about</div>
        ${p.flags.map(f=>`
          <div class="flag" style="background:${f.bg};border-color:${f.bc};">
            <div class="flag-ic"><i class="ti ${f.icon}" style="color:${f.c};"></i></div>
            <div>
              <div class="flag-title" style="color:${f.c};">${f.t}</div>
              <div class="flag-body" style="color:${f.c};">${f.b}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Medications + Care team -->
    <div class="g2">
      <div class="card cp">
        <div class="clabel"><i class="ti ti-pill"></i> Medications today</div>
        ${p.meds.map(m=>`
          <div class="med-row">
            <div class="med-dot" style="background:${m.dot};"></div>
            <div class="med-name">${m.name}</div>
            <div class="med-dose">${m.dose}</div>
            <span class="med-chip" style="background:${m.chipBg};color:${m.chipC};">${m.chipT}</span>
          </div>
        `).join('')}
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="card cp">
          <div class="clabel"><i class="ti ti-users"></i> Care team</div>
          ${p.careteam.map(ct=>`

        <div class="ai-box">

          <div class="ai-body">${p.ai}</div>

  `;

              <div class="todo-text" style="font-weight:500;">${td.t}</div>

      <div class="card cp">
        <div class="clabel"><i class="ti ti-users"></i> Family contacts</div>
        <div style="margin-bottom:14px;">
          ${p.contacts.map(c=>`
            <div class="fc-row">
              <div class="fcav">${c.ini}</div>
              <div><div class="fcname">${c.n}</div><div class="fcrel">${c.r}</div></div>
              <button class="fcbtn">Message team</button>

      </div>
      <div class="fnote" style="border-radius:var(--r-lg);align-self:start;">
        <div class="fnote-tag"><i class="ti ti-message-circle" style="font-size:12px;"></i> From the care team</div>

    </div>
  `;
}

renderList();
render();
</script>
