<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareView — Wellbeing Dashboard</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f3f0; --card: #ffffff; --text: #181816; --muted: #6b6b67;
      --soft: #eeecea; --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.16);
      --purple: #534AB7; --purple-light: #EEEDFE; --purple-mid: #AFA9EC;
      --green: #1D9E75; --green-light: #E1F5EE;
      --amber: #BA7517; --amber-light: #FAEEDA;
      --red: #A32D2D; --red-light: #FCEBEB;
      --r-md: 10px; --r-lg: 14px; --r-xl: 20px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #181816; --card: #222220; --text: #eeecea; --muted: #8a8a86;
        --soft: #2a2a28; --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.16);
      }
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Layout */
    .shell { display: grid; grid-template-columns: 72px 220px 1fr; min-height: 100vh; }

    /* Icon nav sidebar */
    .sidenav { background: var(--card); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 6px; }
    .sidenav-logo { width: 38px; height: 38px; background: var(--purple); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    .sidenav-logo i { font-size: 20px; color: #fff; }
    .nav-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 20px; }
    .nav-icon:hover { background: var(--soft); }
    .nav-icon.active { background: var(--purple-light); color: var(--purple); }
    .nav-spacer { flex: 1; }

    /* Patient list panel */
    .patient-panel { background: var(--card); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; }
    .panel-header { padding: 20px 16px 14px; border-bottom: 0.5px solid var(--border); }
    .panel-title { font-size: 13px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
    .search-box { display: flex; align-items: center; gap: 6px; background: var(--soft); border-radius: 8px; padding: 7px 10px; font-size: 13px; color: var(--muted); }

    .pt-list { padding: 10px 10px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
    .pt-item { padding: 11px 12px; border-radius: var(--r-md); cursor: pointer; border: 1px solid transparent; transition: all 0.12s; }
    .pt-item:hover { background: var(--soft); }
    .pt-item.active { background: var(--purple-light); border-color: var(--purple-mid); }
    .pt-row1 { display: flex; align-items: center; gap: 9px; margin-bottom: 5px; }
    .pt-av { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
    .pt-name { font-size: 14px; font-weight: 500; flex: 1; }
    .status-pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .pt-meta { font-size: 11px; color: var(--muted); padding-left: 43px; }

    /* View toggle */
    .view-bar { display: flex; align-items: center; gap: 6px; padding: 16px 20px; border-bottom: 0.5px solid var(--border); }
    .vt { padding: 6px 14px; border-radius: 99px; font-size: 13px; cursor: pointer; border: 0.5px solid transparent; background: transparent; color: var(--muted); font-family: var(--font); transition: all 0.12s; }
    .vt.active { background: var(--purple); color: #fff; border-color: var(--purple); }
    .view-sub { font-size: 12px; color: var(--muted); margin-left: auto; }

    /* Main content */
    .main { overflow-y: auto; }
    .content { padding: 20px; display: flex; flex-direction: column; gap: 14px; }

    /* Cards */
    .card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--r-lg); }
    .card-p { padding: 18px 20px; }
    .clabel { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; display: flex; align-items: center; gap: 5px; }

    /* Hero */
    .hero-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .hero-card { border-radius: var(--r-xl); padding: 22px 24px; }
    .hc-top { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    .hc-av { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 500; flex-shrink: 0; }
    .hc-name { font-size: 20px; font-weight: 500; }
    .hc-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .hc-score-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .hc-score { font-size: 32px; font-weight: 500; letter-spacing: -1px; }
    .hc-desc { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.6; }

    /* Wellbeing bars */
    .wb { display: flex; flex-direction: column; gap: 11px; }
    .wb-row { display: flex; align-items: center; gap: 10px; }
    .wb-label { font-size: 12px; color: var(--muted); width: 80px; flex-shrink: 0; }
    .wb-track { flex: 1; height: 6px; background: var(--soft); border-radius: 99px; overflow: hidden; }
    .wb-fill { height: 100%; border-radius: 99px; }
    .wb-num { font-size: 12px; font-weight: 500; width: 28px; text-align: right; }

    /* Stat row */
    .stat-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; }
    .stat { border-radius: var(--r-md); padding: 14px 16px; }
    .stat-val { font-size: 22px; font-weight: 500; margin-bottom: 3px; }
    .stat-label { font-size: 11px; opacity: .75; }
    .stat-icon { font-size: 18px; margin-bottom: 8px; }

    /* Activity */
    .act-list { display: flex; flex-direction: column; }
    .act-item { display: flex; gap: 12px; align-items: flex-start; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
    .act-item:last-child { border-bottom: none; padding-bottom: 0; }
    .act-ic { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .act-body { flex: 1; }
    .act-title { font-size: 13px; font-weight: 500; }
    .act-sub { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
    .act-time { font-size: 11px; color: var(--muted); white-space: nowrap; padding-top: 2px; }

    /* Alerts */
    .alert-list { display: flex; flex-direction: column; gap: 8px; }
    .al { border-radius: var(--r-md); padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start; }
    .al-ic { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .al-title { font-size: 13px; font-weight: 500; }
    .al-body { font-size: 12px; margin-top: 2px; line-height: 1.5; opacity: .8; }

    /* AI note */
    .ai-note { border-left: 3px solid var(--purple); border-radius: 0 var(--r-md) var(--r-md) 0; padding: 14px 16px; background: var(--purple-light); }
    .ai-note-tag { font-size: 11px; font-weight: 500; color: var(--purple); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
    .ai-note-text { font-size: 13px; color: #3C3489; line-height: 1.7; }

    /* Family view */
    .fam-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .fam-hero { padding: 28px 24px; text-align: center; border-radius: var(--r-xl); }
    .fam-status { font-size: 28px; font-weight: 500; margin-bottom: 6px; }
    .fam-tagline { font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 280px; margin: 0 auto; }
    .fam-score-row { display: flex; justify-content: center; gap: 24px; margin-top: 20px; }
    .fam-score-item { text-align: center; }
    .fam-score-val { font-size: 22px; font-weight: 500; }
    .fam-score-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .update-list { display: flex; flex-direction: column; gap: 9px; }
    .upd { border-radius: var(--r-md); padding: 13px 15px; }
    .upd-title { font-size: 13px; font-weight: 500; margin-bottom: 3px; display: flex; align-items: center; gap: 7px; }
    .upd-body { font-size: 12px; line-height: 1.6; opacity: .85; }

    .contact-list { display: flex; flex-direction: column; }
    .ct-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 0.5px solid var(--border); }
    .ct-row:last-child { border-bottom: none; }
    .ct-av { width: 34px; height: 34px; border-radius: 50%; background: var(--purple-light); color: var(--purple); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; }
    .ct-name { font-size: 13px; font-weight: 500; }
    .ct-rel { font-size: 11px; color: var(--muted); }
    .ct-btn { margin-left: auto; font-size: 11px; padding: 4px 12px; border-radius: 99px; border: 0.5px solid var(--border2); background: transparent; cursor: pointer; color: var(--muted); font-family: var(--font); }
    .ct-btn:hover { background: var(--soft); }

    .hidden { display: none !important; }
  </style>
</head>

    <div class="content" id="content"></div>

</div>

let sel = 0;
let view = 'caregiver';

function setView(v, btn) {
  view = v;
  document.querySelectorAll('.vt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function selectPerson(id) {
  sel = id;
  renderList();
  render();
}

function renderList() {
  document.getElementById('pt-list').innerHTML = people.map(p => `
    <div class="pt-item ${p.id === sel ? 'active' : ''}" onclick="selectPerson(${p.id})">
      <div class="pt-row1">
        <div class="pt-av" style="background:${p.avBg};color:${p.avColor};">${p.initials}</div>
        <div class="pt-name">${p.name}</div>
        <div class="status-pip" style="background:${p.pipColor};"></div>
      </div>
      <div class="pt-meta">${p.age} · ${p.room} · ${p.statusLabel}</div>
    </div>
  `).join('');
}

function render() {
  const p = people[sel];
  document.getElementById('view-sub').textContent = view === 'caregiver' ? 'Clinical & behavioral overview' : 'For family members & loved ones';
  if (view === 'caregiver') renderCaregiver(p);
  else renderFamily(p);
}

function renderCaregiver(p) {
  document.getElementById('content').innerHTML = `
    <div class="hero-grid">
      <div class="card hero-card" style="background:${p.avBg}30;border-color:${p.avBg};">
        <div class="hc-top">
          <div class="hc-av" style="background:${p.avBg};color:${p.avColor};">${p.initials}</div>
          <div>
            <div class="hc-name">${p.name}</div>
            <div class="hc-sub">${p.age} · ${p.room}</div>
          </div>
        </div>
        <div class="hc-score-label">Overall wellbeing</div>
        <div class="hc-score" style="color:${p.scoreColor};">${p.score}<span style="font-size:16px;font-weight:400;color:var(--muted);"> / 100 — ${p.scoreLabel}</span></div>
        <div class="hc-desc">${p.tagline}</div>
      </div>
      <div class="card card-p" style="grid-column: span 2;">
        <div class="clabel"><i class="ti ti-heart"></i> Wellbeing</div>
        <div class="wb">
          ${p.wellbeing.map(w => `
            <div class="wb-row">
              <div class="wb-label">${w.l}</div>
              <div class="wb-track"><div class="wb-fill" style="width:${w.v}%;background:${w.c};"></div></div>
              <div class="wb-num" style="color:${w.c};">${w.v}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="stat-row">
      ${p.stats.map(s => `
        <div class="stat card" style="background:${s.bg}30;border-color:${s.bg};">
          <div class="stat-icon"><i class="ti ${s.icon}" style="color:${s.c};"></i></div>
          <div class="stat-val" style="color:${s.c};">${s.val}</div>
          <div class="stat-label" style="color:${s.c};">${s.label}</div>
        </div>
      `).join('')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div class="card card-p">
        <div class="clabel"><i class="ti ti-calendar"></i> Today's activity</div>
        <div class="act-list">
          ${p.activities.map(a => `
            <div class="act-item">
              <div class="act-ic" style="background:${a.iBg};color:${a.iC};"><i class="ti ${a.icon}"></i></div>
              <div class="act-body">
                <div class="act-title">${a.title}</div>
                <div class="act-sub">${a.sub}</div>
              </div>
              <div class="act-time">${a.time}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="card card-p">
          <div class="clabel"><i class="ti ti-alert-circle"></i> Focus areas today</div>
          <div class="alert-list">
            ${p.alerts.map(a => `
              <div class="al" style="background:${a.bg}40;color:${a.c};">
                <div class="al-ic"><i class="ti ${a.icon}"></i></div>
                <div>
                  <div class="al-title">${a.title}</div>
                  <div class="al-body">${a.body}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="ai-note">
          <div class="ai-note-tag"><i class="ti ti-brain" style="font-size:12px;"></i> AI summary</div>
          <div class="ai-note-text">${p.aiNote}</div>
        </div>
      </div>
    </div>
  `;
}

function renderFamily(p) {
  document.getElementById('content').innerHTML = `
    <div class="fam-grid">
      <div class="card fam-hero" style="background:${p.avBg}25;border-color:${p.avBg};">
        <div class="hc-av" style="background:${p.avBg};color:${p.avColor};width:52px;height:52px;font-size:18px;margin:0 auto 14px;">${p.initials}</div>
        <div class="fam-status">${p.famStatus}</div>
        <div class="fam-tagline">${p.famTagline}</div>
        <div class="fam-score-row">
          ${p.famScore.map(s => `
            <div class="fam-score-item">
              <div class="fam-score-val" style="color:${p.scoreColor};">${s.val}</div>
              <div class="fam-score-label">${s.label}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="card card-p">
        <div class="clabel"><i class="ti ti-sparkles"></i> Today's updates</div>
        <div class="update-list">
          ${p.famUpdates.map(u => `
            <div class="upd" style="background:${u.bg}30;border-left:2.5px solid ${u.c};border-radius:0 var(--r-md) var(--r-md) 0;padding:12px 14px;">
              <div class="upd-title" style="color:${u.c};"><i class="ti ${u.icon}" style="font-size:14px;"></i>${u.title}</div>
              <div class="upd-body" style="color:var(--muted);">${u.body}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div class="card card-p">
        <div class="clabel"><i class="ti ti-users"></i> Family contacts</div>
        <div class="contact-list">
          ${p.contacts.map(c => `
            <div class="ct-row">
              <div class="ct-av">${c.ini}</div>
              <div>
                <div class="ct-name">${c.name}</div>
                <div class="ct-rel">${c.rel}</div>
              </div>
              <button class="ct-btn">Message care team</button>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="ai-note" style="border-radius:var(--r-lg);background:#E1F5EE40;border-left:3px solid #1D9E75;border-color:#9FE1CB;">
        <div class="ai-note-tag" style="color:#0F6E56;"><i class="ti ti-message-circle" style="font-size:12px;"></i> Note from the care team</div>
        <div class="ai-note-text" style="color:#085041;">${p.famNote}</div>
      </div>
    </div>
  `;
}

renderList();
render();
