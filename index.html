  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f3; --card: #ffffff; --text: #1a1a18; --muted: #6b6b67;
      --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
      --radius-md: 8px; --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1a1a18; --card: #242422; --text: #f0efe8; --muted: #9a9993; --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2); }
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
    .dash { max-width: 1140px; margin: 0 auto; }

    /* Topbar */
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .topbar h1 { font-size: 20px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .topbar span { font-size: 13px; color: var(--muted); }
    .badge-ai { background: #EEEDFE; color: #3C3489; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: #E6F1FB; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: #185FA5; }
    .btn { padding: 7px 14px; font-size: 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: transparent; color: var(--text); cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
    .btn:hover { background: var(--bg); }

    /* Metrics */
    .metrics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .mc { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; }
    .mc-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
    .mc-val { font-size: 22px; font-weight: 500; }
    .mc-sub { font-size: 11px; margin-top: 3px; }
    .up { color: #0F6E56; } .dn { color: #A32D2D; } .wn { color: #854F0B; }

    /* Main 3-col layout */
    .main { display: grid; grid-template-columns: 230px minmax(0,1fr) 230px; gap: 12px; align-items: start; }

    /* Patient list */
    .sec-label { font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 8px; }
    .patient-list { display: flex; flex-direction: column; gap: 7px; }
    .pc { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 11px 13px; cursor: pointer; transition: border-color 0.15s; }
    .pc:hover { border-color: var(--border2); }
    .pc.active { border: 1.5px solid #534AB7; }
    .pc-name { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .pc-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .pc-time { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .sdot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; }
    .s-alert { background: #E24B4A; } .s-stable { background: #1D9E75; } .s-warn { background: #EF9F27; }
    .sbadge { font-size: 10px; padding: 2px 8px; border-radius: 12px; font-weight: 500; }

    /* Detail panel */
    .detail-panel { display: flex; flex-direction: column; gap: 11px; }
    .card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 15px; }
    .card-title { font-size: 13px; font-weight: 500; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

    /* Patient header */
    .pt-header { display: flex; gap: 12px; align-items: flex-start; }
    .pt-avatar { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 500; flex-shrink: 0; }
    .pt-name { font-size: 16px; font-weight: 500; }
    .pt-sub { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
    .pt-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .tag { font-size: 11px; padding: 2px 9px; border-radius: 12px; border: 0.5px solid var(--border2); color: var(--muted); }

    /* Vitals */
    .vitals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .vi { background: var(--bg); border-radius: var(--radius-md); padding: 10px 12px; }
    .vi.flagged { border-left: 3px solid #E24B4A; border-radius: 0 var(--radius-md) var(--radius-md) 0; }
    .vi-name { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .vi-val { font-size: 17px; font-weight: 500; }
    .vi-unit { font-size: 11px; color: var(--muted); font-weight: 400; }
    .vi-trend { font-size: 11px; margin-top: 2px; }
    .sparkline { width: 100%; height: 46px; margin-top: 8px; }

    /* Medications */
    .med-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
    .med-row:last-child { border-bottom: none; padding-bottom: 0; }
    .med-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .med-name { font-weight: 500; color: var(--text); flex: 1; }
    .med-detail { color: var(--muted); }
    .med-time { font-size: 11px; color: var(--muted); text-align: right; }

    /* Timeline */
    .tl { list-style: none; }
    .tl-item { display: flex; gap: 10px; margin-bottom: 9px; font-size: 12px; }
    .tl-time { color: var(--muted); min-width: 42px; }
    .tl-dc { display: flex; flex-direction: column; align-items: center; }
    .tl-dot { width: 8px; height: 8px; border-radius: 50%; background: #534AB7; margin-top: 3px; flex-shrink: 0; }
    .tl-line { width: 1px; background: var(--border); flex: 1; margin-top: 3px; }
    .tl-text { color: var(--muted); line-height: 1.5; }
    .tl-text strong { color: var(--text); font-weight: 500; }

    /* AI panel */
    .ai-header { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; margin-bottom: 10px; }
    .ai-live { background: #EEEDFE; color: #3C3489; font-size: 10px; padding: 2px 7px; border-radius: 12px; font-weight: 500; }
    .insight { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
    .ii { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
    .ii.alert { background: #FCEBEB; color: #A32D2D; }
    .ii.info  { background: #E1F5EE; color: #0F6E56; }
    .ii.warn  { background: #FAEEDA; color: #854F0B; }
    .insight-text { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .insight-text strong { color: var(--text); font-weight: 500; }

    /* Care recs */
    .crec { border-radius: var(--radius-md); padding: 10px 12px; margin-bottom: 8px; }
    .crec-title { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
    .crec-body { font-size: 11px; line-height: 1.5; }

    /* Contacts */
    .contact-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
    .contact-row:last-child { border-bottom: none; }
    .contact-av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; background: #E6F1FB; color: #185FA5; }
    .contact-name { font-weight: 500; flex: 1; }
    .contact-rel { color: var(--muted); font-size: 11px; }
    .contact-phone { color: var(--muted); }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>

      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div class="pc-name"><span class="sdot ${p.dotClass}"></span>${p.name}</div>
          <div class="pc-meta">${p.age} · Room ${p.room} · ${p.diagnosis.split('—')[0].split('(')[0].trim()}</div>
        </div>
        <span class="sbadge" style="background:${p.statusBg};color:${p.statusColor};">${p.statusLabel}</span>
      </div>
      <div class="pc-time">Last vitals: ${p.lastVitals}</div>
    </div>
  `).join('');
}

function renderDetail(p) {
  document.getElementById('detail-panel').innerHTML = `
    <div class="card">
      <div class="pt-header">
        <div class="pt-avatar" style="background:${p.avatarBg};color:${p.avatarColor};">${p.initials}</div>
        <div style="flex:1;">
          <div class="pt-name">${p.name}</div>
          <div class="pt-sub">${p.age} years old · Room ${p.room}<br>${p.diagnosis}<br>Admitted ${p.admitted} · ${p.physician}</div>
          <div class="pt-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>
      ${p.notes ? `<div style="margin-top:12px;font-size:12px;color:var(--muted);line-height:1.6;padding:10px 12px;background:var(--bg);border-radius:var(--radius-md);border-left:3px solid #534AB7;border-radius:0 var(--radius-md) var(--radius-md) 0;">
        <span style="font-weight:500;color:var(--text);">Care note:</span> ${p.notes}
      </div>` : ''}
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-activity-heartbeat"></i> Live vitals <span style="margin-left:auto;font-size:11px;color:var(--muted);">Updated ${p.lastVitals}</span></div>
      <div class="vitals-grid">
        ${p.vitals.map(v => `
          <div class="vi ${v.flagged ? 'flagged' : ''}">
            <div class="vi-name">${v.name}</div>
            <div class="vi-val">${v.val} <span class="vi-unit">${v.unit}</span></div>
            <div class="vi-trend ${v.trendClass}">${v.trend}</div>
          </div>
        `).join('')}
      </div>
      <svg class="sparkline" viewBox="0 0 400 50" preserveAspectRatio="none" role="img" aria-label="Vital trend chart">
        <polyline points="${p.sparkPoints}" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linejoin="round"/>
        <polyline points="${p.sparkPoints} 400,50 0,50" fill="#EEEDFE" stroke="none"/>
        <text x="2" y="48" font-size="9" fill="#888780">6h ago</text>
        <text x="358" y="48" font-size="9" fill="#888780">now</text>
        <text x="2" y="10" font-size="9" fill="#534AB7">${p.sparkLabel}</text>
      </svg>
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-pill"></i> Current medications</div>
      ${p.meds.map(m => `
        <div class="med-row">
          <div class="med-dot" style="background:${m.color};"></div>
          <div class="med-name">${m.name}</div>
          <div class="med-detail">${m.detail}</div>
          <div class="med-time">${m.time}</div>
        </div>
      `).join('')}
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-clock-hour-4"></i> Today's events</div>
      <ul class="tl">
        ${p.events.map((e, i) => `
          <li class="tl-item">
            <span class="tl-time">${e.time}</span>
            <div class="tl-dc"><div class="tl-dot" style="background:${e.dot};"></div>${i < p.events.length - 1 ? '<div class="tl-line"></div>' : ''}</div>
            <span class="tl-text">${e.text}</span>
          </li>
        `).join('')}
      </ul>
    </div>
  `;
}

function renderAI(p) {
  document.getElementById('ai-panel').innerHTML = `
    <div class="card" style="margin-bottom:11px;">
      <div class="ai-header"><i class="ti ti-brain"></i> AI insights <span class="ai-live">Live</span></div>
      ${p.insights.map(ins => `
        <div class="insight">
          <div class="ii ${ins.type}"><i class="ti ${ins.icon}"></i></div>
          <div class="insight-text">${ins.title ? `<strong>${ins.title}</strong> ` : ''}${ins.body}</div>
        </div>
      `).join('')}
    </div>

    <div class="card" style="margin-bottom:11px;">
      <div class="ai-header"><i class="ti ti-clipboard-list"></i> Care recommendations</div>
      ${p.recs.map(r => `
        <div class="crec" style="background:${r.bg};">
          <div class="crec-title" style="color:${r.titleColor};">${r.title}</div>
          <div class="crec-body" style="color:${r.bodyColor};">${r.body}</div>
        </div>
      `).join('')}
    </div>

    <div class="card">
      <div class="ai-header"><i class="ti ti-users"></i> Family &amp; contacts</div>
      ${p.contacts.map(c => `
        <div class="contact-row">
          <div class="contact-av">${c.initials}</div>
          <div style="flex:1;">
            <div class="contact-name">${c.name}</div>
            <div class="contact-rel">${c.rel}</div>
          </div>
          <div class="contact-phone">${c.phone}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function select(id) {
  selected = id;
  renderPatientList();
  renderDetail(patients[id]);
  renderAI(patients[id]);
}

select(0);
</script>
</body>
</html>
